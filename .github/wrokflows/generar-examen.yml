name: Generar examen Neo4j

on:
  workflow_dispatch:

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar examen
        env:
          PREGUNTAS_JSON: ${{ secrets.PREGUNTAS_JSON }}
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: python generator/generar_examen.py

      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Examen generado automáticamente" || echo "No changes"
          git push