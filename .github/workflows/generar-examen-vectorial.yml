name: Generador Exámenes Vectoriales Presenciales

on:
  workflow_dispatch:

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          pip install requests python-docx

      - name: Ejecutar generador
        run: python generar_examen_vectorial.py
        env:
          ORG_PAT: ${{ secrets.ORG_PAT_CL }}
          BANK_PAT: ${{ secrets.BANK_PAT }}

          QUESTION_BANK_VECTORIAL: ${{ secrets.QUESTION_BANK_VECTORIAL }}

          CONFIG_JSON: ${{ secrets.CONFIG_JSON_VECTORIAL }}

          ALUMNOS_CSV: ${{ secrets.ALUMNOS_CSV }}

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: examenes-vectoriales-presenciales
          path: |
            examenes_vectoriales.docx
            respuestas_vectoriales.docx
            examenes_vectoriales_generados.json